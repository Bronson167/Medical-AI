<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical AI Chatbot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .chat-box { height: 400px; overflow-y: auto; }
    .user-msg { background-color: #0d6efd; color: white; align-self: flex-end; }
    .bot-msg { background-color: #e9ecef; align-self: flex-start; color: black; }
    .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card rounded-4 shadow">
      <div class="card-header bg-primary text-white text-center">
        <h4>Medical AI Chatbot</h4>
      </div>
      <div class="card-body d-flex flex-column chat-box" id="chat-box">
        <div class="message bot-msg">Hello! How can I assist you today?</div>
      </div>
      <div class="card-footer">
        <form id="chat-form" class="d-flex">
          <input type="text" id="user-input" class="form-control me-2" placeholder="Type your message..." required>
          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const chatForm = document.getElementById("chat-form");
    const userInput = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = userInput.value.trim();
      if (!msg) return;

      // Affiche le message utilisateur
      const userMsgDiv = document.createElement("div");
      userMsgDiv.className = "message user-msg";
      userMsgDiv.textContent = msg;
      chatBox.appendChild(userMsgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      userInput.value = "";

      try {
        // Appel AJAX au backend
        const res = await fetch("/get", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ msg })
        });
        const data = await res.json();

        // Affiche la réponse du bot
        const botMsgDiv = document.createElement("div");
        botMsgDiv.className = "message bot-msg";
        botMsgDiv.textContent = data.answer;
        chatBox.appendChild(botMsgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

      } catch (err) {
        console.error(err);
        const botMsgDiv = document.createElement("div");
        botMsgDiv.className = "message bot-msg";
        botMsgDiv.textContent = "Error: unable to get response";
        chatBox.appendChild(botMsgDiv);
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
